name: "update-nix-fetchgit"

on:
  workflow_dispatch:
  schedule:
   - cron: "22 9 * * 0"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-nix-fetchgit.yaml"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: generate-token
        with:
          app-id: ${{ secrets.CPR_APP_ID }}
          private-key: ${{ secrets.CPR_APP_PRIVATE_KEY }}

      - name: Install Nix
        uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31.10.4
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: workflow/nix-shell-action@031bcb0eb0396e0a585e86906809af10fe3bd499 # v4.0.0
        with:
          packages: fd,update-nix-fetchgit
          script: |
            fd .nix --exec update-nix-fetchgit --only-commented || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          sign-commits: true
          commit-message: Update fetchgit* refs
          title: 'Update fetchgit* refs'
          draft: false
          branch: chore/update-nix-fetch-git
          delete-branch: true
